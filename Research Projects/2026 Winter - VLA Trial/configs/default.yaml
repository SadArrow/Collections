data:
  robot: default
  proprio_len: 2
  action_len: 16
  action_dim: 7
  goal_dim: 6
  proprio_dim: 7
  action_rel_len: 1
  dt_steps: 1
  action_token_num: 256
  img_steps: 1
  img_key: [front, side]
  image_size: 224
  tokenizer_type: ratio_min_max_uniform
  count_num: 100
  tokenizer_ratio_limit: 0.1

model:
  backbone_2d:
    name: vit_base_patch16_224
    image_size: 224
    pretrained: true
    feature_layer: -2
  llm:
    name: HuggingFaceTB/SmolLM2-360M
    max_len: 2048
    attn_implementation: eager
  pred: cot_flow_matching
  action_expert: true
  action_expert_cfg:
    hidden_size_scale: 2
    intermediate_size_scale: 2
  flow_matching_cfg:
    beta_alpha: 2.0
    beta_beta: 2.0
    time_min: 0.01
    time_max: 1.0
